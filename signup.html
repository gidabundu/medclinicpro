<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>MedClinic Pro - Sign Up</title>
  <style>body{font-family:Arial,Helvetica,sans-serif;background:#f3f4f6;display:flex;align-items:center;justify-content:center;height:100vh;margin:0}form{background:#fff;padding:24px;border-radius:8px;box-shadow:0 6px 18px rgba(0,0,0,.06);width:320px;box-sizing:border-box}h2{margin-bottom:12px}input{width:100%;padding:10px;margin-bottom:10px;border:1px solid #ddd;border-radius:6px;box-sizing:border-box}button{width:100%;padding:10px;background:#16a34a;color:#fff;border:none;border-radius:6px;cursor:pointer}a{display:block;text-align:center;margin-top:10px;color:#2563eb;text-decoration:none}.password-container{position:relative;width:100%;margin-bottom:10px}.password-container input{margin-bottom:0;padding-right:40px}.toggle-password{position:absolute;right:10px;top:50%;transform:translateY(-50%);cursor:pointer;background:none;border:none;padding:0;color:#666;width:auto;display:flex;align-items:center;justify-content:center;height:100%}</style>
</head>
<body>
  <form id="signupForm">
    <h2>Create Account</h2>
    <input type="text" id="name" placeholder="Full name">
    <input type="email" id="email" placeholder="Email" required>
    <div class="password-container">
      <input type="password" id="password" placeholder="Password (min 8 chars, uppercase, lowercase, number)" required>
      <button type="button" class="toggle-password" id="togglePassword">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
      </button>
    </div>
    <button type="submit">Sign Up</button>
    <a href="login.html">Already have an account?</a>
  </form>

  <script>
    const togglePassword = document.getElementById('togglePassword');
    const passwordInput = document.getElementById('password');
    togglePassword.addEventListener('click', function () {
      const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
      passwordInput.setAttribute('type', type);
      this.innerHTML = type === 'password' ? '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>' : '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>';
    });
    document.getElementById('signupForm').addEventListener('submit', async function(e){
      e.preventDefault();
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      if(password.length < 8){alert('Password must be at least 8 characters');return;}
      if(!/[A-Z]/.test(password)){alert('Password must contain at least one uppercase letter');return;}
      if(!/[a-z]/.test(password)){alert('Password must contain at least one lowercase letter');return;}
      if(!/[0-9]/.test(password)){alert('Password must contain at least one number');return;}
      const apiBase = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
        ? window.location.origin
        : 'https://medclinicpro.onrender.com';
      try{
        const res = await fetch(`${apiBase}/api/signup`,{
          method:'POST',
          headers:{'Content-Type':'application/json'},
          credentials: 'include',
          body:JSON.stringify({name,email,password})
        });
        if(!res.ok){const err=await res.json(); alert(err.error||'Signup failed'); return;}
        window.location.href = 'medclinic-pro.html';
      }catch(err){
        alert('Network error. Make sure the auth server is running and open this page from the server URL.');
      }
    });
  </script>
</body>
</html>
