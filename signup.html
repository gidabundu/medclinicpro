<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>MedClinic Pro - Sign Up</title>
  <style>body{font-family:Arial,Helvetica,sans-serif;background:#f3f4f6;display:flex;align-items:center;justify-content:center;height:100vh;margin:0}form{background:#fff;padding:24px;border-radius:8px;box-shadow:0 6px 18px rgba(0,0,0,.06);width:320px}h2{margin-bottom:12px}input{width:100%;padding:10px;margin-bottom:10px;border:1px solid #ddd;border-radius:6px}button{width:100%;padding:10px;background:#16a34a;color:#fff;border:none;border-radius:6px;cursor:pointer}a{display:block;text-align:center;margin-top:10px;color:#2563eb;text-decoration:none}</style>
</head>
<body>
  <form id="signupForm">
    <h2>Create Account</h2>
    <input type="text" id="name" placeholder="Full name">
    <input type="email" id="email" placeholder="Email" required>
    <input type="password" id="password" placeholder="Password (min 8 chars, uppercase, lowercase, number)" required>
    <button type="submit">Sign Up</button>
    <a href="login.html">Already have an account?</a>
  </form>

  <script>
    document.getElementById('signupForm').addEventListener('submit', async function(e){
      e.preventDefault();
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      if(password.length < 8){alert('Password must be at least 8 characters');return;}
      if(!/[A-Z]/.test(password)){alert('Password must contain at least one uppercase letter');return;}
      if(!/[a-z]/.test(password)){alert('Password must contain at least one lowercase letter');return;}
      if(!/[0-9]/.test(password)){alert('Password must contain at least one number');return;}
      const apiBase = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
        ? window.location.origin
        : 'https://medclinicpro.onrender.com';
      try{
        const res = await fetch(`${apiBase}/api/signup`,{
          method:'POST',
          headers:{'Content-Type':'application/json'},
          credentials: 'include',
          body:JSON.stringify({name,email,password})
        });
        if(!res.ok){const err=await res.json(); alert(err.error||'Signup failed'); return;}
        window.location.href = 'medclinic-pro.html';
      }catch(err){
        alert('Network error. Make sure the auth server is running and open this page from the server URL.');
      }
    });
  </script>
</body>
</html>
