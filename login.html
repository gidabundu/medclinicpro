<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>MedClinic Pro - Login</title>
  <style>body{font-family:Arial,Helvetica,sans-serif;background:#f3f4f6;display:flex;align-items:center;justify-content:center;height:100vh;margin:0}form{background:#fff;padding:24px;border-radius:8px;box-shadow:0 6px 18px rgba(0,0,0,.06);width:320px}h2{margin-bottom:12px}input{width:100%;padding:10px;margin-bottom:10px;border:1px solid #ddd;border-radius:6px}button{width:100%;padding:10px;background:#2563eb;color:#fff;border:none;border-radius:6px;cursor:pointer}a{display:block;text-align:center;margin-top:10px;color:#2563eb;text-decoration:none}</style>
</head>
<body>
  <form id="loginForm">
    <h2>Sign In</h2>
    <input type="email" id="email" placeholder="Email" required>
    <input type="password" id="password" placeholder="Password" required>
    <button type="submit">Login</button>
    <a href="signup.html">Create an account</a>
  </form>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async function(e){
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const apiBase = window.location.origin;
      try{
        const res = await fetch(`${apiBase}/api/login`,{
          method:'POST',
          headers:{'Content-Type':'application/json'},
          credentials: 'include',
          body:JSON.stringify({email,password})
        });
        if(!res.ok){const err=await res.json(); alert(err.error||'Login failed'); return;}
        window.location.href = 'medclinic-pro.html';
      }catch(err){
        alert('Network error. Make sure the auth server is running and open this page from the server URL.');
      }
    });
  </script>
</body>
</html>
