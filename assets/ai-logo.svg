<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="aiGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="aiGradient2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a2b4b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="12" fill="url(#aiGradient)"/>
  <!-- Robot Head -->
  <g fill="white">
    <!-- Head -->
    <rect x="16" y="18" width="32" height="24" rx="6" fill="url(#aiGradient2)"/>
    
    <!-- Eyes -->
    <circle cx="24" cy="28" r="5" fill="white"/>
    <circle cx="40" cy="28" r="5" fill="white"/>
    <circle cx="24" cy="28" r="2" fill="#1a2b4b"/>
    <circle cx="40" cy="28" r="2" fill="#1a2b4b"/>
    
    <!-- Antenna -->
    <line x1="32" y1="18" x2="32" y2="12" stroke="white" stroke-width="2"/>
    <circle cx="32" cy="10" r="3" fill="#3b82f6"/>
    
    <!-- Mouth -->
    <rect x="26" y="36" width="12" height="3" rx="1.5" fill="white"/>
    
    <!-- Body -->
    <rect x="20" y="44" width="24" height="12" rx="4" fill="url(#aiGradient2)"/>
    
    <!-- Arms -->
    <rect x="10" y="46" width="8" height="4" rx="2" fill="url(#aiGradient2)"/>
    <rect x="46" y="46" width="8" height="4" rx="2" fill="url(#aiGradient2)"/>
  </g>
</svg>
